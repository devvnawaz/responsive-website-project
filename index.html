<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://kit.fontawesome.com/03eb6e855f.js" crossorigin="anonymous"></script>
    <title>Flower Market Responsive Website Project</title>
</head>
<body class="inter-font">

    <header>
        <nav class="flex bottom-margin content-width-mobile">
            <img src="/assets/logo.png" alt="" class="logo">
            <ul class="nav-menu flex">
                <li><a href="#" id="nav-menu-active">Home</a></li>
                <li><a href="#">Shop</a></li>
